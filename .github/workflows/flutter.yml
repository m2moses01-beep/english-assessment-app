name: Flutter Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
    
    - name: Check for Android files
      run: |
        if [ ! -d "android" ]; then
          echo "❌ No android folder found. Creating one..."
          # Create basic Android structure
          mkdir -p android/app/src/main/kotlin
          echo 'include ":app"' > android/settings.gradle
          echo 'buildscript { dependencies { classpath "com.android.tools.build:gradle:7.3.0" } }' > android/build.gradle
        else
          echo "✅ Android folder exists"
        fi
    
    - name: Generate missing files with Flutter
      run: |
        # This will generate any missing Android files
        flutter create --platforms android --org com.example --project-name english_assessment . 2>/dev/null || true
    
    - name: Build
      run: |
        flutter pub get
        flutter build apk --release
    
    - uses: actions/upload-artifact@v4
      with:
        name: app
        path: build/app/outputs/flutter-apk/
