name: Flutter Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        
    - name: Create complete Android project
      run: |
        echo "=== Creating complete Android project ==="
        
        # Clean up
        rm -rf android
        
        # Create directory structure
        mkdir -p android/app/src/main/kotlin/com/example/englishassessment
        mkdir -p android/app/src/main/res/values
        mkdir -p android/gradle/wrapper
        
        # 1. Create settings.gradle (CRITICAL - tells Gradle about 'app' module)
        cat > android/settings.gradle << 'EOF'
        include ':app'
        EOF
        
        # 2. Create AndroidManifest.xml
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.englishassessment">
            <application
                android:label="English Assessment"
                android:icon="@mipmap/ic_launcher">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                <meta-data android:name="flutterEmbedding" android:value="2"/>
            </application>
        </manifest>
        EOF
        
        # 3. Create MainActivity.kt
        cat > android/app/src/main/kotlin/com/example/englishassessment/MainActivity.kt << 'EOF'
        package com.example.englishassessment
        import io.flutter.embedding.android.FlutterActivity
        class MainActivity: FlutterActivity()
        EOF
        
        # 4. Create app/build.gradle
        cat > android/app/build.gradle << 'EOF'
        def localProperties = new Properties()
        def localPropertiesFile = rootProject.file('local.properties')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader('UTF-8') { reader ->
                localProperties.load(reader)
            }
        }

        def flutterRoot = localProperties.getProperty('flutter.sdk')
        if (flutterRoot == null) {
            throw new GradleException("Flutter SDK not found.")
        }

        apply plugin: 'com.android.application'
        apply plugin: 'kotlin-android'
        apply from: "\$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

        android {
            namespace "com.example.englishassessment"
            compileSdkVersion 34

            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }

            kotlinOptions {
                jvmTarget = '1.8'
            }

            sourceSets {
                main.java.srcDirs += 'src/main/kotlin'
            }

            defaultConfig {
                applicationId "com.example.englishassessment"
                minSdkVersion 21
                targetSdkVersion 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    signingConfig signingConfigs.debug
                }
            }
        }

        flutter {
            source '../..'
        }

        dependencies {
            implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.7.10"
        }
        EOF
        
        # 5. Create android/build.gradle
        cat > android/build.gradle << 'EOF'
        buildscript {
            ext.kotlin_version = '1.7.10'
            repositories {
                google()
                mavenCentral()
            }

            dependencies {
                classpath 'com.android.tools.build:gradle:7.3.0'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version"
            }
        }

        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
        
        # 6. Create gradle.properties
        cat > android/gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx1536M
        android.enableR8=true
        EOF
        
        # 7. Create gradle wrapper
        cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip
        EOF
        
        echo "✅ Complete Android project with settings.gradle created"
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build APK
      run: |
        echo "=== Building APK ==="
        flutter build apk --release
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: english-assessment-app
        path: build/app/outputs/flutter-apk/app-release.apk
