name: Flutter Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
    
    - name: Create project with Flutter
      run: |
        echo "=== Using Flutter to create project ==="
        
        # Save our code
        if [ -d "lib" ]; then
          mv lib lib_backup
        fi
        
        # Let Flutter create complete project
        flutter create --template app --platforms android --org com.example --project-name english_assessment .
        
        # Restore our code
        if [ -d "lib_backup" ]; then
          rm -rf lib
          mv lib_backup lib
        fi
        
        echo "✅ Flutter created Android files"
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
    
    - uses: actions/upload-artifact@v4
      with:
        name: app
        path: build/app/outputs/flutter-apk/
