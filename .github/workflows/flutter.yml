name: Flutter Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create Flutter project
      run: |
        # Create proper Flutter project structure
        flutter create --template app --project-name english_assessment --org com.example .
        
        # Replace the generated main.dart with our code
        cp lib/main.dart lib/main.dart.backup || true
        echo "Flutter project created successfully"
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.9'
        
    - name: Restore our main.dart
      run: |
        if [ -f lib/main.dart.backup ]; then
          cp lib/main.dart.backup lib/main.dart
          echo "Restored our main.dart code"
        else
          echo "Using existing main.dart"
        fi
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build APK
      run: flutter build apk --release
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: english-assessment-app
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7
