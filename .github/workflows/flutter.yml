name: Flutter Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
    
    - name: Let Flutter create everything
      run: |
        # Temporarily move our code
        if [ -d "lib" ]; then
          mv lib lib_temp
        fi
        
        # Let Flutter create complete project
        flutter create --template app --org com.example --overwrite .
        
        # Restore our code
        if [ -d "lib_temp" ]; then
          rm -rf lib
          mv lib_temp lib
        fi
        
        echo "✅ Flutter created Android/iOS files"
    
    - run: flutter pub get
    - run: flutter build apk --release
    
    - uses: actions/upload-artifact@v4
      with:
        name: app
        path: build/app/outputs/flutter-apk/
