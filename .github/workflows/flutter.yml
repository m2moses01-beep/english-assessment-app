name: Flutter Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
        
    - name: Create minimal Android project
      run: |
        # Create essential directories
        mkdir -p android/app/src/main/kotlin/com/example/englishassessment
        
        # Create minimal AndroidManifest.xml
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.englishassessment">
            <application
                android:label="English Assessment"
                android:icon="@mipmap/ic_launcher">
                <activity android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                <meta-data android:name="flutterEmbedding" android:value="2"/>
            </application>
        </manifest>
        EOF
        
        # Create MainActivity.kt
        cat > android/app/src/main/kotlin/com/example/englishassessment/MainActivity.kt << 'EOF'
        package com.example.englishassessment
        import io.flutter.embedding.android.FlutterActivity
        class MainActivity: FlutterActivity()
        EOF
        
        echo "✅ Minimal Android project created"
        
    - name: Build and upload
      run: |
        flutter pub get
        flutter build apk --release
        
    - uses: actions/upload-artifact@v4
      with:
        name: english-assessment-apk
        path: build/app/outputs/flutter-apk/app-release.apk
