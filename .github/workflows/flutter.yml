name: Flutter Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
    
    - name: Create proper Android project
      run: |
        echo "=== Creating Android project ==="
        
        # Remove old android folder completely
        rm -rf android
        
        # Create fresh Flutter project in temp location
        flutter create --template app --platforms android --org com.example temp_flutter_app
        
        # Copy ALL Android files
        cp -r temp_flutter_app/android .
        
        # CRITICAL: Ensure flutterEmbedding:2 is in AndroidManifest
        sed -i '/<application/a\        <meta-data\n            android:name="flutterEmbedding"\n            android:value="2" />' android/app/src/main/AndroidManifest.xml
        
        # Clean up
        rm -rf temp_flutter_app
        
        echo "✅ Android project created with flutterEmbedding:2"
        
        # Verify the file was updated
        echo "=== Checking AndroidManifest.xml ==="
        grep -n "flutterEmbedding" android/app/src/main/AndroidManifest.xml || echo "WARNING: flutterEmbedding not found!"
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
    
    - uses: actions/upload-artifact@v4
      with:
        name: english-assessment-app
        path: build/app/outputs/flutter-apk/app-release.apk
