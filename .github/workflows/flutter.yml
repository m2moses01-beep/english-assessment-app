name: Flutter Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
        
    - name: Create Android project with fixed Kotlin version
      run: |
        echo "=== Creating Android project ==="
        
        # Clean up
        rm -rf android
        
        # Create directory structure
        mkdir -p android/app/src/main/kotlin/com/example/englishassessment
        mkdir -p android/app/src/main/res/values
        
        # 1. Create settings.gradle
        cat > android/settings.gradle << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        include ':app'
        EOF
        
        # 2. Create AndroidManifest.xml
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.englishassessment">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
                android:label="English Assessment"
                android:icon="@mipmap/ic_launcher"
                android:usesCleartextTraffic="true">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                <meta-data android:name="flutterEmbedding" android:value="2"/>
            </application>
        </manifest>
        EOF
        
        # 3. Create MainActivity.kt
        cat > android/app/src/main/kotlin/com/example/englishassessment/MainActivity.kt << 'EOF'
        package com.example.englishassessment
        import io.flutter.embedding.android.FlutterActivity
        class MainActivity: FlutterActivity()
        EOF
        
        # 4. Create app/build.gradle (FIXED KOTLIN VERSION)
        cat > android/app/build.gradle << 'EOF'
        def localProperties = new Properties()
        def localPropertiesFile = rootProject.file('local.properties')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader('UTF-8') { reader ->
                localProperties.load(reader)
            }
        }

        def flutterRoot = localProperties.getProperty('flutter.sdk')
        if (flutterRoot == null) {
            throw new GradleException("Flutter SDK not found.")
        }

        apply plugin: 'com.android.application'
        apply plugin: 'kotlin-android'
        apply from: "\$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

        android {
            namespace "com.example.englishassessment"
            compileSdkVersion 34

            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }

            kotlinOptions {
                jvmTarget = '1.8'
            }

            sourceSets {
                main.java.srcDirs += 'src/main/kotlin'
            }

            defaultConfig {
                applicationId "com.example.englishassessment"
                minSdkVersion 21
                targetSdkVersion 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    signingConfig signingConfigs.debug
                }
            }
        }

        flutter {
            source '../..'
        }

        dependencies {
            implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.7.10"
        }
        EOF
        
        # 5. Create android/build.gradle (FIXED - no $kotlin_version variable)
        cat > android/build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:7.3.0'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.7.10"
            }
        }

        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
        
        # 6. Create gradle.properties (ENABLE ANDROIDX)
        cat > android/gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx1536M
        android.enableR8=true
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        # 7. Create gradle wrapper
        mkdir -p android/gradle/wrapper
        cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip
        EOF
        
        echo "✅ Android project created with fixed Kotlin version"
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build APK
      run: |
        echo "=== Building APK ==="
        flutter build apk --release
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: english-assessment-app
        path: build/app/outputs/flutter-apk/app-release.apk
