name: Flutter Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
    
    - name: Generate complete Android project
      run: |
        # Create fresh Flutter project
        flutter create --template app --platforms android --org com.example --project-name english_assessment temp_app
        
        # Copy ALL Android files
        cp -r temp_app/android .
        
        # Force flutterEmbedding:2
        sed -i '/<application/a\        <meta-data android:name="flutterEmbedding" android:value="2"/>' android/app/src/main/AndroidManifest.xml
        
        rm -rf temp_app
        
        echo "✅ Android project generated"
    
    - run: flutter pub get
    - run: flutter build apk --release
    
    - uses: actions/upload-artifact@v4
      with:
        name: app
        path: build/app/outputs/flutter-apk/
