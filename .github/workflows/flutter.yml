name: Flutter Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
    
    - name: Create AndroidManifest.xml with correct embedding
      run: |
        echo "=== Creating correct AndroidManifest.xml ==="
        
        # Remove old
        rm -rf android
        
        # Create directory
        mkdir -p android/app/src/main
        
        # Create CORRECT AndroidManifest.xml
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.englishassessment">
            
            <uses-permission android:name="android.permission.INTERNET"/>
            
            <application
                android:label="English Assessment"
                android:icon="@mipmap/ic_launcher"
                android:usesCleartextTraffic="true">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    
                    <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"/>
                    
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                
                <!-- THIS LINE IS CRITICAL -->
                <meta-data
                    android:name="flutterEmbedding"
                    android:value="2"/>
                    
            </application>
        </manifest>
        EOF
        
        echo "✅ Created AndroidManifest.xml with flutterEmbedding:2"
        
        # Create minimal other files
        mkdir -p android/app/src/main/kotlin/com/example/englishassessment
        echo 'package com.example.englishassessment; import io.flutter.embedding.android.FlutterActivity; class MainActivity: FlutterActivity()' > android/app/src/main/kotlin/com/example/englishassessment/MainActivity.kt
        echo 'include ":app"' > android/settings.gradle
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
    
    - uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: build/app/outputs/flutter-apk/
