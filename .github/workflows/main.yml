name: Flutter Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        
    - name: Force create proper Flutter project
      run: |
        # Backup our code
        if [ -d "lib" ]; then
          cp -r lib lib_backup
        fi
        if [ -f "pubspec.yaml" ]; then
          cp pubspec.yaml pubspec_backup.yaml
        fi
        
        # Create fresh Flutter project
        flutter create --template app --org com.example --project-name english_assessment .
        
        # Restore our code
        if [ -d "lib_backup" ]; then
          rm -rf lib
          mv lib_backup lib
        fi
        if [ -f "pubspec_backup.yaml" ]; then
          mv pubspec_backup.yaml pubspec.yaml
        fi
        
        echo "✅ Flutter project structure created"
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build APK
      run: flutter build apk --release
      
    - name: Find and list APK files
      run: |
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo "=== Build directory contents ==="
        ls -la build/ || echo "No build directory"
        ls -la build/app/ 2>/dev/null || echo "No build/app directory"
        ls -la build/app/outputs/ 2>/dev/null || echo "No outputs directory"
        ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No flutter-apk directory"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: english-assessment-app
        path: |
          build/app/outputs/flutter-apk/*.apk
          build/app/outputs/apk/release/*.apk
          build/app/outputs/bundle/release/*.aab
        retention-days: 7
